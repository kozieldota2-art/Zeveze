<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZVZ Stats — Albion Online</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 900px; margin: 0 auto; }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus { border-color: #555; }

    button {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button:hover { background: #333; }
    button:active { transform: scale(0.98); }

    .status {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.25rem;
    }

    .status strong { color: #e8e8e8; }
    .status.error { color: #ff6b6b; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .card-rank {
      font-size: 11px;
      color: #555;
      margin-bottom: 4px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 10px;
      background: #1a3a2a;
      color: #4ade80;
      border-radius: 4px;
      padding: 2px 6px;
      display: inline-block;
      margin-bottom: 6px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 2px 0;
    }

    .stat-label { color: #666; }
    .stat-val { font-weight: 500; color: #ccc; }
    .stat-win { color: #4ade80; font-weight: 600; }
    .stat-loss { color: #f87171; }

    .bar-wrap {
      background: #222;
      border-radius: 4px;
      height: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: #4444aa;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #555;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #333;
      border-top-color: #666;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 2rem;
      font-size: 12px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ZVZ Stats</h1>
    <p class="subtitle">Historico de armas via Murder Ledger — busque qualquer player do Albion</p>

    <div class="search-row">
      <input type="text" id="playerInput" placeholder="Nome do player no Albion..." autocomplete="off" />
      <button onclick="buscar()">Buscar</button>
    </div>

    <div id="status" class="status"></div>
    <div id="results"></div>

    <p class="footer">Fonte: murderledger.com — Dados historicos completos incluindo kills, assists e healers</p>
  </div>

  <script>
    const translation = {
      "Hallowfall":"Queda Santa","Blight Staff":"Pustulento","Holy Staff":"Cajado Sagrado",
      "Dagger Pair":"Par de Adagas","Rampant Staff":"Rampante","Mace":"Maça 1H",
      "Redemption Staff":"Redenção","Incubus Mace":"Íncubo","Hand of Justice":"Mão da Justiça",
      "Nature Staff":"Cajado da Natureza","Hammer":"Martelo 1H","Longbow":"Arco Longo",
      "Druidic Staff":"Cajado Druídico","Polehammer":"Martelo de Batalha","Occult Staff":"Oculto",
      "Staff of Balance":"Cajado do Equilíbrio","Bedrock Mace":"Maça Pétrea",
      "Great Arcane Staff":"Arcano Elevado","Bloodletter":"Dessangradora","Exalted Staff":"Exaltado",
      "Oathkeepers":"Jurador","Dreadstorm Monarch":"Monarca Tempestuoso","Astral Staff":"Astral",
      "Lifecurse Staff":"Execrado","Grovekeeper":"Guarda Bosque","Dagger":"Adaga",
      "Witchwork Staff":"Feiticeiro","Malevolent Locus":"Locus","Arcane Staff":"Arcano Silence",
      "Great Holy Staff":"Sagrado Elevado","Divine Staff":"Cajado Divino",
      "Permafrost Prism":"Prisma","Frost Staff":"Cajado de Gelo","Deathgivers":"Mortíficos",
      "Claws":"Garras","Black Monk Stave":"Monge Negro","Realmbreaker":"Quebra reino",
      "Dawnsong":"Canção da Alvorada","Shadowcaller":"Chama-sombra","Bear Paws":"Patas de Urso",
      "Spirithunter":"Caça espíritos","Carrioncaller":"Chama corpos","Tombhammer":"Martelo Tumular",
      "Mistpiercer":"Furabruma","Bow of Badon":"Badon","Siegebow":"Arco de Cerco",
      "Weeping Repeater":"Repetidor Lamentoso","Boltcasters":"Lançadores de Dardos",
      "Galatines":"Galatinas","Kingmaker":"Cria-reis","Infernal Scythe":"Segadeira",
      "Ghostfang":"Presa Demoníaca","Hellion Hands":"Mãos Pretas","Broadsword":"Espada Larga",
      "Claymore":"Montante","Dual Swords":"Espadas Duplas","Carving Sword":"Espada Entalhada",
      "Battle Axe":"Machado de Guerra","Great Axe":"Machadão","Halberd":"Alabarda",
      "Spear":"Lança","Pike":"Pique","Glaive":"Archa","Heron Spear":"Garceira",
      "Trinity Spear":"Lança Trina","Warhammer":"Martelo de Guerra","Great Hammer":"Martelo Pesado",
      "Forge Hammers":"Martelos de Forja","Crossbow":"Besta","Heavy Crossbow":"Besta Pesada",
      "Light Crossbow":"Besta Leve","Bow":"Arco","Warbow":"Arco de Guerra",
      "Wailing Bow":"Plangente","Whispering Bow":"Arco Sussurrante","Shortsword":"Espada Curta",
      "Sword":"Espada","Rapier":"Rapieira","Cursed Staff":"Cajado Amaldiçoado",
      "Great Cursed Staff":"Cajado Amaldiçoado Elevado","Fire Staff":"Cajado de Fogo",
      "Great Fire Staff":"Cajado de Fogo Elevado"
    };

    function traduzir(en) { return translation[en] || en; }

    function isHealer(w) {
      const n = (w.weapon_name || '').toLowerCase();
      return w.assists > w.kills * 3 ||
        n.includes('holy') || n.includes('nature') || n.includes('divine') ||
        n.includes('redemption') || n.includes('hallowfall') || n.includes('blight') ||
        n.includes('rampant') || n.includes('druidic') || n.includes('exalted');
    }

    // Pega player da URL se passado como parametro
    const params = new URLSearchParams(window.location.search);
    const playerParam = params.get('player');
    if (playerParam) {
      document.getElementById('playerInput').value = playerParam;
    }

    async function buscar() {
      const player = document.getElementById('playerInput').value.trim();
      if (!player) return;

      // Atualiza URL sem recarregar
      history.replaceState(null, '', '?player=' + encodeURIComponent(player));

      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');

      statusEl.className = 'status';
      statusEl.innerHTML = '';
      resultsEl.innerHTML = '<div class="loading"><span class="spinner"></span> Buscando no Murder Ledger...</div>';

      try {
        const target = 'https://murderledger.com/api/players/' + encodeURIComponent(player) + '/stats/weapons?lookback_days=9999';
        const url = 'https://corsproxy.io/?' + encodeURIComponent(target);
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status + ' — player nao encontrado ou servidor lento');
        const data = await res.json();
        const weapons = (data.weapons || []).filter(w => w.weapon_name);

        if (!weapons.length) {
          resultsEl.innerHTML = '';
          statusEl.className = 'status error';
          statusEl.textContent = 'Nenhum dado encontrado para "' + player + '".';
          return;
        }

        const totalUsos = weapons.reduce((s, w) => s + w.usages, 0);
        const maxUsos = weapons[0].usages;

        statusEl.innerHTML = '<strong>' + (data.player_name || player) + '</strong> — ' +
          weapons.length + ' armas — ' + totalUsos.toLocaleString('pt-BR') + ' participacoes totais';

        const html = weapons.slice(0, 15).map((w, i) => {
          const nome = traduzir(w.weapon_name);
          const wr = w.win_rate != null ? Math.round(w.win_rate * 100) : null;
          const healer = isHealer(w);
          const pct = Math.round(w.usages / maxUsos * 100);

          return '<div class="card">' +
            '<div class="card-rank">#' + (i + 1) + '</div>' +
            (healer ? '<span class="badge">Healer / Support</span>' : '') +
            '<div class="card-name" title="' + w.weapon_name + '">' + nome + '</div>' +
            '<div class="stat-row"><span class="stat-label">Usos</span><span class="stat-val">' + w.usages + '</span></div>' +
            '<div class="stat-row"><span class="stat-label">Kills</span><span class="stat-val">' + w.kills + '</span></div>' +
            '<div class="stat-row"><span class="stat-label">Assists</span><span class="stat-val">' + w.assists + '</span></div>' +
            (wr != null ? '<div class="stat-row"><span class="stat-label">Win rate</span><span class="stat-val ' + (wr >= 50 ? 'stat-win' : 'stat-loss') + '">' + wr + '%</span></div>' : '') +
            '<div class="bar-wrap"><div class="bar" style="width:' + pct + '%"></div></div>' +
          '</div>';
        }).join('');

        resultsEl.innerHTML = '<div class="grid">' + html + '</div>';

      } catch (e) {
        resultsEl.innerHTML = '';
        statusEl.className = 'status error';
        statusEl.textContent = 'Erro: ' + e.message;
      }
    }

    document.getElementById('playerInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') buscar();
    });

    if (playerParam) buscar();
  </script>
</body>
</html>
